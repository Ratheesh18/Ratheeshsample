<!DOCTYPE html>
<html>
<head>
    
    <title>Input Types</title>
   
</head>
<body>
        <div>
            <label for="">Text</label>
             <input 
                type="text"
                name="sample-text"
                id=""
                value =""
                placeholder="enter the name"
            />
        </div>

        <div>
            <label for="">password</label>
            <input 
                type="password"
                name="sample-text"
                id=""
                value =""
            />
        </div>

        <div>
            <label for="">Email</label>
            <input 
                type="email"
                name="sample-text"
                id=""
                value =""
            />
        </div>

        <div>
            <label for="">dob</label>
            <input 
                type="date"
                name="sample-text"
                id=""
                value =""
                max="2026-03-12"
               
            />
        </div>


         <div>
            <label for="">date with time</label>
            <input 
                type="datetime-local"
                name="sample-text"
                id=""
                value =""
                max="2026-03-12 11.25"
            />
        </div>


        <div>
            <label for="">Number</label>
            <input 
                type="number"
                name="sample-text"
                id=""
            />
        </div>
        

         <div>
            <label for="">Tel</label>
            <input 
                type="tel"
                name="sample-text"
                id=""
                pattern="[0-9]{10}"
            />
        </div>

         <div>
            <label for="">check box</label>
            <input 
                type="checkbox"
                name="sample-text"
                id=""
                value="tamil"
            /> Tamil
        </div>

        <div>
            <label for="">check box auto checked</label>
            <input 
                type="checkbox"
                name="sample-text"
                id=""
                value="tamil"
                checked
            /> Tamil
        </div>
       
        <div>
            <label for="">check box auto checked</label>
            <input 
                type="radio"
                name="sample-text"
                id=""
                value="tamil"
                checked
            /> Tamil
        </div>

         <div>
            <label for="">file</label>
            <input 
                type="file"
                name="sample-text"
              
            /> 
        </div>


        <div>
            <input type="submit" />
            <input type="button" value="cancel">
            <button>cancel</button>

        </div>

        <div class="rich-text-box">
            <textarea name="address" id="address" rows="20" cols="40"></textarea>
        </div>

        <div class="select-box">
            <select name="fruits" id="fruits">
                <option value="">choose fruits</option>
                <option value="apple">Apple</option>
                <option value="orange">Orange</option>
            </select>
        </div>
       

        

</body>
</html>
