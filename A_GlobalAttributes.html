<!DOCTYPE html>
<html>
<head>
    <title>Global Attributes</title>  
</head>
<body>
 <!--ID and class-->  
 <div id="first">
    <p>Iam a student</p>
 </div>
 <div class="second">
    <p tabindex="1">Iam a engineer</p>
 </div>
 <!--Style Tag  -->
<style>
    #first{
        font-style: italic;
        color:green;
        background-color: aquamarine;
    }
    
    .second{
        color: brown;
        background-color: aquamarine;
    }
</style>
 
<!-- single line style tag -->
<div>
<p style="background-color: blueviolet;" >I a Footballer</p> 
</div>

<!-- tabindex tag -->
<div>
<p tabindex="2"><span title="Indian Overseas Bank">IOB</span> is a bank</p>
</div>

<!-- contenteditable tag -->
<div>
<p contenteditable="">iam a student</p>
</div>
    
</body>
</html>
