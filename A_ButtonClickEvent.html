<!DOCTYPE html>
<html>
<head>
    <title>Button Events</title>
</head>
<body>
    <h1>Mouse Event</h1>
    <!-- ON Click  -->
    <button
    id="Button1"
    class="Button1"
    style="color:white;background-color: brown;" 
    onclick="console.log('Hello to my Html world')"
    >
    Button 1
     </button>

    <!-- On Double Click -->
     <button
     id="button 2"
     class="button2"
     ondblclick="console.log('welocome ')"
     >
     Button 2
    </button>

    <p
    onmouseover="console.log('Welcome to html world')"
    onmousemove="console.log('bye bye')"
    > 
    HTML
    </p>
    
   
</body>
</html>
