<!DOCTYPE html>
<html>
<head>
   <title>Element specfic Attributes</title>
</head>
<body>
    <!-- anchor tag -->

    <div>
        <a href="https://chatgpt.com/">CLICK ME</a>
    </div>

    <!-- Target tag -->

    <div>
        <a href="https://chatgpt.com" target="_blank"> CLICK HERE !</a>
    </div>

    <!-- Download Tag -->

    <div>
    <a href="./luffyPicture.jpg" download>Download</a>
    </div>

    <!-- Image Tag -->

    <div>
        <img src="./luffyPicture.jpg" alt="LUFFY" width="200">
    </div>
</body>
</html>
